<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fenced · decorated code blocks, real HTML, no screenshots</title>
<meta name="description" content="Convert Markdown into gorgeous, self-contained HTML with code blocks rendered as decorated fences. 100% client-side. Nothing is ever uploaded." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#0d0e10" />

<!-- open graph / twitter -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://fenced.dev" />
<meta property="og:title" content="fenced · decorated code blocks, real HTML, no screenshots" />
<meta property="og:description" content="Convert Markdown into gorgeous, self-contained HTML. 100% client-side, nothing is ever uploaded." />
<meta property="og:image" content="https://fenced.dev/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="fenced · decorated code blocks, real HTML, no screenshots" />
<meta name="twitter:description" content="Convert Markdown into gorgeous, self-contained HTML. 100% client-side, nothing is ever uploaded." />
<meta name="twitter:image" content="https://fenced.dev/og.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <svg class="ticks" viewBox="0 0 38 18" width="30" height="15" fill="none" aria-hidden="true" focusable="false">
        <g stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
          <path d="M5 4 L9 11" />
          <path d="M17 4 L21 11" />
          <path d="M29 4 L33 11" />
        </g>
      </svg>
      <span class="name">fenced</span>
      <span class="tag">decorated code blocks, real HTML, no screenshots</span>
    </div>
    <div class="topbar__actions">
      <button class="ctl" id="themeBtn" title="Toggle UI theme">❯ theme: dark</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="label">mode</span>
    <div class="segmented" id="modeCtl" role="tablist" aria-label="Fence mode">
      <button role="tab" aria-selected="true" data-mode="term">terminal</button>
      <button role="tab" aria-selected="false" data-mode="themed">themed</button>
      <button role="tab" aria-selected="false" data-mode="plain">plain</button>
    </div>

    <span class="label">syntax</span>
    <select class="ctl" id="themeSelect" aria-label="Syntax theme"></select>

    <div class="spacer"></div>

    <button class="btn btn-ghost" id="copyBtn">copy html</button>
    <button class="btn btn-primary" id="downloadBtn">❯ download .html</button>
  </div>

  <div class="panes">
    <section class="pane">
      <div class="pane__head">
        <span>markdown.md</span>
        <div class="actions">
          <button class="ctl" id="uploadBtn">upload</button>
          <button class="ctl" id="sampleBtn">sample</button>
        </div>
        <input type="file" id="fileInput" accept=".md,.markdown,text/markdown,text/plain" hidden />
      </div>
      <textarea class="editor" id="editor" spellcheck="false" placeholder="# paste or drop markdown here

fenced turns every ```code``` block into a decorated window.
everything runs in your browser. nothing is uploaded."></textarea>
    </section>

    <section class="pane">
      <div class="pane__head">
        <span>preview</span>
        <div class="actions">
          <span id="status"></span>
        </div>
      </div>
      <div class="preview" id="preview">
        <article class="fenced-doc" id="doc"></article>
      </div>
    </section>
  </div>

  <footer class="footer">
    <span class="footer__note">Processed in browser. no uploads.</span>
    <nav class="footer__links">
      <a href="/privacy.html">privacy</a>
      <a href="/terms.html">terms</a>
      <a href="https://github.com/lars-1987/fenced" target="_blank" rel="noopener">github</a>
      <a class="kofi" href="https://ko-fi.com" target="_blank" rel="noopener">☕ buy me a coffee</a>
    </nav>
  </footer>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
